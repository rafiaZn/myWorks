<!DOCTYPE html>
<html>
<head>
  <title>Statement App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">

  <h2 class="text-center mb-4">Statement Management</h2>

  <!-- Add Section -->
  <div class="card p-3 mb-4">
    <div class="row g-2">
      <div class="col-md-3">
        <input type="date" id="date" class="form-control">
      </div>
      <div class="col-md-3">
        <input type="text" id="header" placeholder="Header" class="form-control">
      </div>
      <div class="col-md-2">
        <input type="number" id="credit" placeholder="Credit" class="form-control">
      </div>
      <div class="col-md-2">
        <input type="number" id="debit" placeholder="Debit" class="form-control">
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="addTransaction()">Add</button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <table class="table table-bordered text-center">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Header</th>
        <th>Credit</th>
        <th>Debit</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- Totals -->
  <div class="text-end">
    <h5>Total Credit: <span id="totalCredit">0</span></h5>
    <h5>Total Debit: <span id="totalDebit">0</span></h5>
    <h4>Balance: <span id="balance">0</span></h4>
  </div>
</div>

<!-- Side Edit Panel -->
<div id="editPanel" class="edit-panel">
  <h4>Edit Transaction</h4>
  <input type="hidden" id="editId">
  <input type="date" id="editDate" class="form-control mb-2">
  <input type="text" id="editHeader" class="form-control mb-2">
  <input type="number" id="editCredit" class="form-control mb-2">
  <input type="number" id="editDebit" class="form-control mb-2">
  <button class="btn btn-success w-100 mb-2" onclick="saveEdit()">Save</button>
  <button class="btn btn-secondary w-100" onclick="closePanel()">Cancel</button>
</div>

<script src="script.js"></script>
</body>
</html>
