<!DOCTYPE html>
<html>
  <head>
    <title>Typing SKill Assessemnt</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
     <div class="container">
       <h1>Typing Skills Assessemnt</h1>
       <div class="time-section">
         <p>Clock: <span id="clock"></span></p>
         <p>Timer: <span id="timer">0</span></p>
       </div>
       <textarea id="textArea" placeholder="Start Typing..."></textarea>
       <div class="card">
         <h3>Summary</h3>
         <p> Words Typed Per Second: <span id="wps">0</span></p>
         <p> Characters Typed Per Second: <span id="cps">0</span></p>
         <p> Sentences Typed Per Minute: <span id="spm">0</span></p>
       </div>
       <button id="resetButton">RESET</button>
     </div>
      <!--<p id="currentTime"></p>-->
      <script src="script.js"></script>
  </body>
</html>
