<!DOCTYPE html>
<html>
<head>
  <title>Transaction App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">

  <h2 class="text-center mb-4">Transaction App (JSON Server)</h2>

  <div class="row g-2">
    <div class="col-md-3">
      <input type="date" id="date" class="form-control">
    </div>

    <div class="col-md-3">
      <input type="text" id="description" class="form-control" placeholder="Description">
    </div>

    <div class="col-md-2">
      <input type="number" id="credit" class="form-control" placeholder="Credit">
    </div>

    <div class="col-md-2">
      <input type="number" id="debit" class="form-control" placeholder="Debit">
    </div>

    <div class="col-md-2">
      <button class="btn btn-primary w-100" onclick="addTransaction()">Add</button>
    </div>
  </div>

  <table class="table table-bordered mt-4">
    <thead class="table-dark">
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Credit</th>
        <th>Debit</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="row mt-3 text-center">
    <div class="col-md-4">
      <h5>Total Credit: <span id="totalCredit">0</span></h5>
    </div>
    <div class="col-md-4">
      <h5>Total Debit: <span id="totalDebit">0</span></h5>
    </div>
    <div class="col-md-4">
      <h5>Balance: <span id="balance">0</span></h5>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
